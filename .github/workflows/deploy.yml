name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; queue subsequent ones.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout va_energy_data
        uses: actions/checkout@v4
        with:
          path: va_energy_data

      - name: Checkout Social-Data-Commons (data dependency)
        uses: actions/checkout@v4
        with:
          repository: dads2busy/Social-Data-Commons
          path: social-data-commons

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: va_energy_data/package-lock.json

      - name: Install dependencies
        working-directory: va_energy_data
        run: npm ci

      - name: Build static site
        working-directory: va_energy_data
        env:
          NEXT_PUBLIC_BASE_PATH: /va_energy_data
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: va_energy_data/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
